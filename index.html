<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Página en GitHub</title>
    <style>
        /* Un estilo CSS rápido y bonito para que no se vea tan vacío */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 400px;
        }
        h1 {
            color: #24292e; /* Color estilo GitHub */
            margin-bottom: 10px;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2ea44f; /* Verde de GitHub */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #22863a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>¡Hola, GitHub! 🚀</h1>
        <p>Este es mi primer sitio web básico subido y alojado directamente desde un repositorio de GitHub.</p>
        <a href="https://github.com" target="_blank" class="btn">Visitar mi GitHub</a>
    </div>

</body>
</html>
